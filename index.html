<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Actividad de retroalimentación: Acróstico del derrame petrolero</title>
  <style>
    :root{
      --bg:#f4f7fb;
      --card:#ffffff;
      --ink:#16202a;
      --muted:#5f6b76;
      --accent:#0f4c81;
      --accent-2:#0b7a75;
      --warn:#9b2226;
      --ok:#1f7a1f;
      --line:#d9e3ec;
      --soft:#eef5fb;
      --shadow:0 12px 30px rgba(22,32,42,.10);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(180deg,#eaf2f8 0%, #f7fafc 100%);
      color:var(--ink);
    }
    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:32px 18px 48px;
    }
    .hero{
      background:linear-gradient(135deg,#0f4c81 0%, #145f53 100%);
      color:#fff;
      border-radius:22px;
      padding:28px;
      box-shadow:var(--shadow);
      margin-bottom:24px;
    }
    .hero h1{
      margin:0 0 10px;
      font-size:clamp(1.8rem, 4vw, 2.8rem);
      line-height:1.1;
    }
    .hero p{
      margin:8px 0;
      max-width:900px;
      color:rgba(255,255,255,.92);
      line-height:1.6;
    }
    .meta{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:16px;
    }
    .pill{
      background:rgba(255,255,255,.15);
      border:1px solid rgba(255,255,255,.18);
      padding:8px 12px;
      border-radius:999px;
      font-size:.95rem;
    }
    .grid{
      display:grid;
      grid-template-columns:1.1fr .9fr;
      gap:22px;
    }
    .card{
      background:var(--card);
      border-radius:20px;
      box-shadow:var(--shadow);
      padding:22px;
    }
    .card h2{
      margin:0 0 10px;
      color:var(--accent);
    }
    .card p, .card li{
      line-height:1.6;
      color:#243240;
    }
    .instructions{
      background:var(--soft);
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px 16px;
      margin-bottom:16px;
    }
    .acrostic-row{
      display:grid;
      grid-template-columns:64px 1fr;
      gap:12px;
      align-items:start;
      padding:12px 0;
      border-bottom:1px solid #ebf0f5;
    }
    .acrostic-row:last-child{border-bottom:none}
    .letter{
      width:56px;
      height:56px;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,#0f4c81,#157c8d);
      color:#fff;
      font-size:1.55rem;
      font-weight:700;
      letter-spacing:.04em;
    }
    .prompt{
      font-weight:700;
      margin-bottom:7px;
      color:#16324a;
    }
    .hint{
      font-size:.95rem;
      color:var(--muted);
      margin-bottom:8px;
    }
    input[type="text"]{
      width:100%;
      border:1px solid #c8d6e3;
      background:#fff;
      border-radius:12px;
      padding:12px 14px;
      font-size:1rem;
      outline:none;
      transition:.2s ease;
    }
    input[type="text"]:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 4px rgba(15,76,129,.12);
    }
    .feedback{
      margin-top:7px;
      min-height:22px;
      font-size:.94rem;
      font-weight:700;
    }
    .ok{color:var(--ok)}
    .bad{color:var(--warn)}
    .controls{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:18px;
    }
    button{
      border:none;
      padding:12px 18px;
      border-radius:12px;
      font-size:1rem;
      font-weight:700;
      cursor:pointer;
      transition:.2s ease;
    }
    .primary{background:var(--accent); color:#fff}
    .primary:hover{filter:brightness(1.05)}
    .secondary{background:#edf4fa; color:var(--accent); border:1px solid #d7e3ee}
    .secondary:hover{background:#e3eef8}
    .scorebox{
      margin-top:18px;
      padding:14px 16px;
      background:#f8fbfe;
      border:1px solid var(--line);
      border-radius:14px;
      font-weight:700;
    }
    .facts{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
      margin-top:14px;
    }
    .fact{
      background:#f8fbfd;
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px;
    }
    .fact strong{
      display:block;
      color:var(--accent);
      font-size:1.2rem;
      margin-bottom:4px;
    }
    .timeline{
      margin:14px 0 0;
      padding-left:18px;
    }
    .timeline li{margin-bottom:10px}
    .small{
      font-size:.92rem;
      color:var(--muted);
    }
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
    }
    @media (max-width:560px){
      .acrostic-row{grid-template-columns:1fr}
      .letter{width:50px;height:50px}
      .facts{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Acróstico interactivo de retroalimentación</h1>
 
    </section>

    <div class="grid">
      <section class="card">
        <h2>Completa el acróstico</h2>
        <div class="instructions">
          Escribe la palabra que responde a cada pista. Cada respuesta inicia con la letra mostrada a la izquierda. Cuando termines, presiona <strong>Revisar respuestas</strong>.
        </div>

        <div id="acrostic"></div>

        <div class="controls">
          <button class="primary" onclick="checkAnswers()">Revisar respuestas</button>
          <button class="secondary" onclick="showAnswers()">Mostrar respuestas</button>
          <button class="secondary" onclick="clearAnswers()">Limpiar</button>
        </div>

        <div id="score" class="scorebox">Aún no se ha revisado la actividad.</div>
      </section>

    
  </div>

  <script>
    const items = [
      { letter:'D', prompt:'Comienza con D', hint:'Se refiere al daño y perturbación grave causado al ambiente y a la vida costera.', answer:'desastre' },
      { letter:'E', prompt:'Comienza con E', hint:'Tipo de situación que describe la gravedad del evento en el Golfo.', answer:'emergencia' },
      { letter:'R', prompt:'Comienza con R', hint:'Acción necesaria para compensar a comunidades y ecosistemas afectados.', answer:'reparacion' },
      { letter:'R', prompt:'Comienza con R', hint:'Actividad económica de la que viven muchas comunidades afectadas.', answer:'pesca' , accept:['pesca','redes']},
      { letter:'A', prompt:'Comienza con A', hint:'Plataforma petrolera vinculada al ducto donde se originó la fuga.', answer:'abkatun' },
      { letter:'M', prompt:'Comienza con M', hint:'Elemento que ayudó a documentar el derrame desde el espacio.', answer:'monitoreo' , accept:['monitoreo','monitoreo satelital']},
      { letter:'E', prompt:'Comienza con E', hint:'Lo que ocurre cuando una institución esconde información relevante.', answer:'encubrimiento' },
      { letter:'P', prompt:'Comienza con P', hint:'Empresa señalada como responsable del ducto y del derrame.', answer:'pemex' },
      { letter:'E', prompt:'Comienza con E', hint:'Una de las afectaciones principales sobre fauna y costas.', answer:'ecosistemas' },
      { letter:'T', prompt:'Comienza con T', hint:'Animal marino muy mencionado por la contaminación de centros de anidación.', answer:'tortugas' },
      { letter:'R', prompt:'Comienza con R', hint:'Lo que exigen las comunidades cuando se les oculta la verdad.', answer:'respuesta' , accept:['respuesta','rendicion','rendicion de cuentas']},
      { letter:'O', prompt:'Comienza con O', hint:'Situación institucional de falta de transparencia.', answer:'opacidad' },
      { letter:'L', prompt:'Comienza con L', hint:'Zona costera afectada por cientos de kilómetros.', answer:'litoral' },
      { letter:'E', prompt:'Comienza con E', hint:'Sector natural profundamente dañado por el derrame.', answer:'entorno' , accept:['entorno','ecosistema','ecosistemas']},
      { letter:'R', prompt:'Comienza con R', hint:'Acción de reconocer la culpa y asumir consecuencias.', answer:'responsabilidad' },
      { letter:'O', prompt:'Comienza con O', hint:'Oleoducto Old AK-C: así empieza la palabra que nombra su operación principal.', answer:'oleoducto' }
    ];

    const container = document.getElementById('acrostic');

    items.forEach((item, index) => {
      const row = document.createElement('div');
      row.className = 'acrostic-row';
      row.innerHTML = `
        <div class="letter">${item.letter}</div>
        <div>
          <div class="prompt">${index + 1}. ${item.prompt}</div>
          <div class="hint">${item.hint}</div>
          <input type="text" id="ans-${index}" placeholder="Escribe tu respuesta aquí" />
          <div class="feedback" id="fb-${index}"></div>
        </div>
      `;
      container.appendChild(row);
    });

    function normalize(text){
      return text
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9\s]/g, '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function checkAnswers(){
      let score = 0;
      items.forEach((item, index) => {
        const input = document.getElementById(`ans-${index}`);
        const fb = document.getElementById(`fb-${index}`);
        const value = normalize(input.value);
        const valid = [item.answer].concat(item.accept || []).map(normalize);

        if(valid.includes(value)){
          fb.textContent = 'Correcto';
          fb.className = 'feedback ok';
          score++;
        } else if(value.length === 0){
          fb.textContent = 'Sin responder';
          fb.className = 'feedback bad';
        } else {
          fb.textContent = 'Revisa la pista e inténtalo otra vez';
          fb.className = 'feedback bad';
        }
      });

      const scoreBox = document.getElementById('score');
      scoreBox.textContent = `Resultado: ${score} de ${items.length} respuestas correctas.`;
    }

    function showAnswers(){
      items.forEach((item, index) => {
        document.getElementById(`ans-${index}`).value = item.answer;
        const fb = document.getElementById(`fb-${index}`);
        fb.textContent = `Respuesta: ${item.answer}`;
        fb.className = 'feedback ok';
      });
      document.getElementById('score').textContent = 'Se mostraron las respuestas modelo del acróstico.';
    }

    function clearAnswers(){
      items.forEach((item, index) => {
        document.getElementById(`ans-${index}`).value = '';
        const fb = document.getElementById(`fb-${index}`);
        fb.textContent = '';
        fb.className = 'feedback';
      });
      document.getElementById('score').textContent = 'Actividad reiniciada. Aún no se ha revisado la actividad.';
    }
  </script>
</body>
</html>
